<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RUMAAR Greeting Card</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #C9A646;
  --dark: #121212;
  --charcoal: #1F1F1F;
}

body {
  margin: 0;
  padding: 24px;
  font-family: 'Tajawal', 'Montserrat', sans-serif;
  background: linear-gradient(135deg, var(--dark), var(--charcoal));
  color: white;
  text-align: center;
}

/* زر اللغة */
.lang-switch {
  position: absolute;
  top: 20px;
  right: 20px;
}

.lang-switch button {
  background: var(--gold);
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

/* رسالة التهنئة */
.greeting-box {
  max-width: 700px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(201,166,70,0.3);
  padding: 18px;
  border-radius: 14px;
  margin-bottom: 20px;
}

.greeting-box h2 {
  margin: 0 0 10px;
  color: var(--gold);
}

.greeting-box p {
  margin: 0;
  color: #ddd;
  line-height: 1.6;
}

/* الإدخال */
.controls {
  margin: 20px 0;
}

input {
  padding: 14px;
  width: 320px;
  max-width: 90%;
  border-radius: 12px;
  border: 1px solid var(--gold);
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 16px;
}

/* زر تحميل */
button.download {
  padding: 14px 20px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: var(--gold);
  color: black;
}

/* الكارت */
.card {
  position: relative;
  max-width: 800px;
  margin: 20px auto;
  overflow: hidden;
  border-radius: 15px;
  padding: 0;
  background: transparent;
}

.card img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* الاسم */
.name {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 50px;
  color: var(--gold);
  text-shadow: 0 3px 10px rgba(0,0,0,0.9);
}

@media (max-width: 768px) {
  .name {
    font-size: 24px;
  }
}
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="toggleLang()">EN / عربي</button>
</div>

<!-- التهنئة -->
<div class="greeting-box">
  <h2 id="title">عيدكم مبارك 🌙</h2>
  <p id="desc">
    تتقدم شركة رونق الإعمار بأطيب التهاني والتبريكات لفريق العمل الكريم،
    سائلين الله أن يعيده عليكم بالصحة والنجاح والتوفيق.
  </p>
</div>

<!-- الإدخال -->
<div class="controls">
  <input
    type="text"
    id="nameInput"
    placeholder="اكتب اسمك بالعربي أو الإنجليزي"
  >
  <br>
  <button class="download" onclick="download()" id="downloadBtn">تحميل البطاقة</button>
</div>

<!-- الكارت -->
<div class="card" id="card">
  <img src="Ahmed younis (1).png">
  <div class="name" id="nameText">اسمك هنا</div>
</div>

<script>
let isArabic = true;

function toggleLang() {
  isArabic = !isArabic;

  if (!isArabic) {
    document.documentElement.lang = "en";
    document.body.style.direction = "ltr";

    document.getElementById("title").textContent = "Eid Mubarak 🌙";
    document.getElementById("desc").textContent =
      "RUMAAR Contracting extends its warmest wishes to our valued team. Wishing you success and prosperity.";
    document.getElementById("nameInput").placeholder = "Write your name";
    document.getElementById("downloadBtn").textContent = "Download Card";
    document.getElementById("nameText").textContent = "Your Name";

  } else {
    document.documentElement.lang = "ar";
    document.body.style.direction = "rtl";

    document.getElementById("title").textContent = "عيدكم مبارك 🌙";
    document.getElementById("desc").textContent =
      "تتقدم شركة رونق الإعمار بأطيب التهاني والتبريكات لفريق العمل الكريم، سائلين الله أن يعيده عليكم بالصحة والنجاح والتوفيق.";
    document.getElementById("nameInput").placeholder = "اكتب اسمك بالعربي أو الإنجليزي";
    document.getElementById("downloadBtn").textContent = "تحميل البطاقة";
    document.getElementById("nameText").textContent = "اسمك هنا";
  }
}

const input = document.getElementById("nameInput");
const nameText = document.getElementById("nameText");

input.addEventListener("input", () => {
  nameText.textContent = input.value || (isArabic ? "اسمك هنا" : "Your Name");
});

/* 🔥 دالة التحميل بدون حواف */
function download() {
  html2canvas(document.getElementById("card"), {
    useCORS: true,
    scale: 3,
    backgroundColor: null
  }).then(canvas => {

    const ctx = canvas.getContext("2d");
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imgData.data;

    let top = 0, bottom = canvas.height;
    let left = 0, right = canvas.width;

    // فوق
    for (let y = 0; y < canvas.height; y++) {
      for (let x = 0; x < canvas.width; x++) {
        if (data[(y * canvas.width + x) * 4 + 3] !== 0) {
          top = y;
          y = canvas.height;
          break;
        }
      }
    }

    // تحت
    for (let y = canvas.height - 1; y >= 0; y--) {
      for (let x = 0; x < canvas.width; x++) {
        if (data[(y * canvas.width + x) * 4 + 3] !== 0) {
          bottom = y;
          y = 0;
          break;
        }
      }
    }

    // شمال
    for (let x = 0; x < canvas.width; x++) {
      for (let y = 0; y < canvas.height; y++) {
        if (data[(y * canvas.width + x) * 4 + 3] !== 0) {
          left = x;
          x = canvas.width;
          break;
        }
      }
    }

    // يمين
    for (let x = canvas.width - 1; x >= 0; x--) {
      for (let y = 0; y < canvas.height; y++) {
        if (data[(y * canvas.width + x) * 4 + 3] !== 0) {
          right = x;
          x = 0;
          break;
        }
      }
    }

    const croppedCanvas = document.createElement("canvas");
    croppedCanvas.width = right - left;
    croppedCanvas.height = bottom - top;

    croppedCanvas.getContext("2d").drawImage(
      canvas,
      left, top,
      croppedCanvas.width,
      croppedCanvas.height,
      0, 0,
      croppedCanvas.width,
      croppedCanvas.height
    );

    const link = document.createElement("a");
    link.download = "RUMAAR_Card.png";
    link.href = croppedCanvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
